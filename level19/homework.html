<!DOCTYPE html>
<html>

<head>

    <title>Pizza Form</title>

</head>

<body>

    <h1>Pizza Form</h1>

    <form>

        <h4>Personal Info</h4>

        <label for="first-name">First Name:</label>
        <input type="text" id="first-name" name="first_name">
        <br>
        <label for="last-name">Last Name:</label>
        <input type="text" id="last-name" name="last_name">
        <br>
        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone" style="width: 250px;">




        <h4>Pizza</h4>


        <label><input type="radio" name="size" value="small"> Small</label><br>
        <label><input type="radio" name="size" value="medium"> Medium</label><br>
        <label><input type="radio" name="size" value="large"> Large</label><br>
        <h4>toppings(check all that apply):</h4>
        <input type="checkbox" name="toppings" value="extra-cheese" id="c1"><label for="c1">Extra Cheese</label><br>
        <input type="checkbox" name="toppings" value="sausage" id="c3"><label for="c3">Sausage</label><br>
        <input type="checkbox" name="toppings" value="mushrooms" id="c4"><label for="c4">Mushrooms</label><br>
        <input type="checkbox" name="toppings" value="black-olives" id="c5"><label for="c5">Black Olives</label><br>
        <input type="checkbox" name="toppings" value="green-peppers" id="c6"><label for="c6">Green Peppers</label><br>
        <input type="checkbox" name="toppings" value="tomatos" id="c7"><label for="c7">Tomatos</label><br>
        <input type="checkbox" name="toppings" value="onions" id="c8"><label for="c8">Onions</label><br>
        <input type="checkbox" name="toppings" value="anchovies" id="c9"><label for="c9">Anchovies</label><br>
        <br>

        <input type="submit">
    </form>

</body>

</html>
