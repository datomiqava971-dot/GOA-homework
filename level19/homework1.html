<!DOCTYPE html>
<html>
  <head>
    <title>form</title>
  </head>

  <body>
    <h1>APPLICATION FORM</h1>
    
    <p style="text-align: center; max-width: 800px; margin: 0 auto;">
      Thank you for your interest in working with us. Please check below for available job opportunities that meet your criteria and send your application by filling out the Job Application Form.
    </p>

    <br><br>

    <form>
      <label for="full_name">* Full Name: </label>
      <input type="text" id="full_name" placeholder="Enter your full name">

      <br><br>

      <label for="email">* Email: </label>
      <input type="text" id="email" placeholder="Enter your Email">

      <br><br>

      <label for="age">* Age: </label>
      <input type="text" id="age" placeholder="Age">

      <br><br>

      <label for="current_role">Which option best describes your current role? </label>
      <select id="current_role">
        <option>Student</option>
        <option>Employed</option>
        <option>Unemployed</option>
      </select>

      <br><br>

      <label>* Would you like to list references? </label>
      <br>
      <input type="radio" id="yes" name="references" value="yes">
      <label for="yes">Yes</label>
      <br>
      <input type="radio" id="no" name="references" value="no">
      <label for="no">No</label>

      <br><br>

      <label for="position">Which position would you like to apply for? </label>
      <select id="position">
        <option>Select an option</option>
        <option>Developer</option>
        <option>Designer</option>
      </select>

      <br><br>

      <label>Which programming languages do you know? </label>
      <br>
      <input type="checkbox" id="java" name="languages" value="java">
      <label for="java">Java</label>
      <br>
      <input type="checkbox" id="python" name="languages" value="python">
      <label for="python">Python</label>
      <br>
      <input type="checkbox" id="js" name="languages" value="javascript">
      <label for="js">JavaScript</label>
      <br>
      <input type="checkbox" id="cpp" name="languages" value="c++">
      <label for="cpp">C++</label>
      <br>
      <input type="checkbox" id="swift" name="languages" value="swift">
      <label for="swift">Swift</label>
      <br>
      <input type="checkbox" id="ruby" name="languages" value="ruby">
      <label for="ruby">Ruby</label>
      <br>
      <input type="checkbox" id="net" name="languages" value=".net">
      <label for="net">.NET</label>

      <br><br>

      <label for="comments">Any Comments? </label>
      <br>
      <textarea id="comments" placeholder="Enter your comment here..."></textarea>

      <br><br>

      <input type="submit" value="Submit">
    </form>
  </body>
</html>
