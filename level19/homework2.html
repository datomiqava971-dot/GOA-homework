<!DOCTYPE html>
<html>
<head>

</head>
<body>

    <h1>Contact Details</h1>

    <form>
        <label for="first_name">First name: </label>
        <input type="text" id="first_name" value="Fred">
        <br><br>

        <label for="last_name">Last name:* </label>
        <input type="text" id="last_name" value="Bloggs">
        <br><br>

        <label for="street">Street address: </label>
        <input type="text" id="street" value="Station Road">
        <br><br>

        <label for="city">Town/city: </label>
        <input type="text" id="city" value="Dorkwell">
        <br><br>

        <label for="postcode">Postcode/zip: </label>
        <input type="text" id="postcode" value="DW1 56A">
        <br><br>

        <label for="tel">Telephone: </label>
        <input type="text" id="tel" value="0123 456789">
        <br><br>

        <label for="mobile">Mobile: </label>
        <input type="text" id="mobile" value="01567 899876">
        <br><br>

        <label for="email">Email address:* </label>
        <input type="text" id="email" value="fbloggs@coldmail.net">
        <br><br>

        <p>Fields marked * are required.</p>

        <input type="submit" value="Submit">
    </form>

</body>
</html>
